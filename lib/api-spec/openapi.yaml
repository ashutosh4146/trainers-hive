        id:
          type: string
        name:
          type: string
        skills:
          type: array
          items:
            type: string

    SkillDemand:
      type: object
      required: [skill, count]
      properties:
        skill:
          type: string
        count:
          type: integer

    Trainer:
      type: object
      required:
        - id
        - name
        - headline
        - mainSkill
        - subSkills
        - experienceYears
        - developmentExperienceYears
        - location
        - remote
        - rating
        - reviewCount
        - hourlyRate
        - verified
        - avatarUrl
        - engagedDates
        - endorsementCount
      properties:
        id:
          type: string
        name:
          type: string
        headline:
          type: string
        mainSkill:
          type: string
        subSkills:
          type: array
          items:
            type: string
        experienceYears:
          type: integer
          description: Years of experience as a trainer
        developmentExperienceYears:
          type: integer
          description: Years of hands-on development experience
        location:
          type: string
        remote:
          type: boolean
        rating:
          type: number
        reviewCount:
          type: integer
        hourlyRate:
          type: integer
        verified:
          type: boolean
        avatarUrl:
          type: string
        availability:
          type: string
        trainerType:
          type: string
          enum: [trainer, developer, both]
