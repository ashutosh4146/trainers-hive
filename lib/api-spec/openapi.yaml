openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trainers Hive — training marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: session
  - name: skills
  - name: trainers
  - name: vendors
  - name: requirements
  - name: applications
  - name: reviews
  - name: stats
  - name: admin
  - name: agreements
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /session/me:
    get:
      operationId: getCurrentUser
      tags: [session]
      summary: Get the currently active demo user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /session/switch:
    post:
      operationId: switchUser
      tags: [session]
      summary: Switch the active demo user (vendor / trainer / admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchUserBody"
      responses:
        "200":
          description: Switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: Skill taxonomy used across the platform
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillCategory"

  /skills/demand:
    get:
      operationId: getSkillsDemand
      tags: [skills]
      summary: Ranked list of skills by open requirement count
      responses:
        "200":
          description: Skill demand list sorted by count descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillDemand"

  /trainers:
    get:
      operationId: listTrainers
      tags: [trainers]
      summary: Browse trainers
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: skill
          schema:
            type: string
        - in: query
          name: skills
          schema:
            type: string
          description: Comma-separated skills (OR-matched against mainSkill and subSkills)
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: remote
          schema:
            type: boolean
        - in: query
          name: minExperience
          schema:
            type: integer
        - in: query
          name: gender
          schema:
            type: string
            enum: [male, female]
        - in: query
          name: sort
          schema:
            type: string
            enum: [rating, experience, recent, endorsements]
      responses:
        "200":
          description: Trainers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trainer"

  /trainers/featured:
    get:
      operationId: listFeaturedTrainers
      tags: [trainers]
      summary: Featured / top-rated trainers
      responses:
        "200":
          description: Featured trainers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trainer"

  /trainers/{id}:
    get:
      operationId: getTrainer
      tags: [trainers]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trainer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerDetail"
    patch:
      operationId: updateTrainer
      tags: [trainers]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainerBody"
      responses:
        "200":
          description: Updated trainer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerDetail"
    delete:
      operationId: deleteTrainer
      tags: [trainers]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /trainers/{id}/resume:
    post:
      operationId: requestTrainerResumeUploadUrl
      tags: [trainers]
      summary: Request a presigned upload URL for the trainer's resume
      description: |
        Authenticated — only the trainer themselves or an admin may call this.
        Validates file metadata (contentType must be PDF/DOC/DOCX, size <= 10 MB).
        Returns a presigned S3 PUT URL for the client to upload directly, plus
        the objectPath (S3 key) to pass to PATCH /trainers/{id} to persist the resume URL.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeUploadRequest"
      responses:
        "200":
          description: Presigned upload URL and objectPath
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeUploadResponse"
        "400":
          description: Invalid file type or size
        "401":
          description: Not authenticated
        "403":
          description: Not the owning trainer or admin

  /trainers/{id}/resume/url:
    get:
      operationId: getTrainerResumeUrl
      tags: [trainers]
      summary: Get a presigned S3 download URL for the trainer's resume
      description: |
        Returns a short-lived presigned S3 GET URL for the trainer's resume.
        Fails with 404 if the trainer has no resume on file.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeDownloadUrlResponse"
        "404":
          description: Trainer not found or has no resume

  /trainers/{id}/reviews:
    get:
      operationId: listTrainerReviews
      tags: [reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createTrainerReview
      tags: [reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /trainers/{id}/endorsements:
    get:
      operationId: listTrainerEndorsements
      tags: [trainers]
      summary: List public endorsements for a trainer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Endorsements with eligibility flag for the calling vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndorsementsListResponse"
    post:
      operationId: createTrainerEndorsement
      tags: [trainers]
      summary: Create an endorsement (vendor with completed engagement only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEndorsementBody"
      responses:
        "201":
          description: Created endorsement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endorsement"
        "403":
          description: Not a vendor, or no completed engagement with this trainer
        "409":
          description: Vendor already has an endorsement for this trainer

  /trainers/{id}/endorsements/{endorsementId}:
    put:
      operationId: updateTrainerEndorsement
      tags: [trainers]
      summary: Update own endorsement text
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: endorsementId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEndorsementBody"
      responses:
        "200":
          description: Updated endorsement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endorsement"
        "403":
          description: Not the endorsement owner
        "404":
          description: Endorsement not found
    delete:
      operationId: deleteTrainerEndorsement
      tags: [trainers]
      summary: Delete own endorsement
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: endorsementId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Not the endorsement owner
        "404":
          description: Endorsement not found

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    patch:
      operationId: updateVendor
      tags: [vendors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}/endorsements:
    get:
      operationId: listVendorEndorsements
      tags: [vendors]
      summary: List all endorsements authored by a vendor (with trainer details)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Endorsements given by the vendor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorEndorsement"
        "403":
          description: Not the owning vendor or an admin

  /vendors/{id}/hiring-stats:
    get:
      operationId: getVendorHiringStats
      tags: [vendors]
      summary: Time-to-hire stats for a vendor (owner or admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hiring stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiringStats"
        "403":
          description: Not the owning vendor or an admin

  /vendors/{id}/saved-trainers:
    get:
      operationId: listSavedTrainers
      tags: [vendors]
      summary: Get all trainers bookmarked by a vendor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Saved trainers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedTrainer"
        "403":
          description: Not the owning vendor
    post:
      operationId: saveTrainer
      tags: [vendors]
      summary: Bookmark a trainer for a vendor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveTrainerBody"
      responses:
        "201":
          description: Trainer saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedTrainer"
        "409":
          description: Already saved

  /vendors/{id}/saved-trainers/{trainerId}:
    delete:
      operationId: unsaveTrainer
      tags: [vendors]
      summary: Remove a trainer bookmark for a vendor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: trainerId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Unsaved
        "404":
          description: Bookmark not found

  /requirements:
    get:
      operationId: listRequirements
      tags: [requirements]
      summary: Browse training requirements
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: skill
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: remote
          schema:
            type: boolean
        - in: query
          name: status
          schema:
            type: string
            enum: [open, closed, vacant]
        - in: query
          name: vendorId
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, deadline, budget]
        - in: query
          name: flagged
          schema:
            type: boolean
        - in: query
          name: skills
          schema:
            type: string
          description: Comma-separated skill names (OR-match)
      responses:
        "200":
          description: Requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Requirement"
    post:
      operationId: createRequirement
      tags: [requirements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequirementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /requirements/recent:
    get:
      operationId: listRecentRequirements
      tags: [requirements]
      summary: Recent open requirements (wow feed)
      responses:
        "200":
          description: Requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Requirement"

  /requirements/{id}:
    get:
      operationId: getRequirement
      tags: [requirements]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Requirement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementDetail"
    patch:
      operationId: updateRequirement
      tags: [requirements]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequirementBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"
    delete:
      operationId: deleteRequirement
      tags: [requirements]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /requirements/{id}/flag:
    post:
      operationId: flagRequirement
      tags: [requirements]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagRequirementBody"
      responses:
        "200":
          description: Flagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /requirements/{id}/bulk-reject:
    post:
      operationId: bulkRejectRequirementApplications
      tags: [requirements]
      summary: Reject all submitted and shortlisted applications for a requirement (vendor-owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Number of applications rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRejectResult"
        "403":
          description: Not the owning vendor
        "404":
          description: Requirement not found

  /requirements/{id}/unflag:
    post:
      operationId: unflagRequirement
      tags: [requirements]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unflagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /requirements/{id}/hide:
    post:
      operationId: hideRequirement
      tags: [requirements]
      summary: Hide a requirement from public listings (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /requirements/{id}/unhide:
    post:
      operationId: unhideRequirement
      tags: [requirements]
      summary: Restore a hidden requirement to public listings (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unhidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /requirements/{id}/warn:
    post:
      operationId: warnRequirementVendor
      tags: [requirements]
      summary: Email a warning to the vendor who posted this requirement (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarnRequirementBody"
      responses:
        "200":
          description: Warning sent
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /requirements/{id}/ai-matches:
    get:
      operationId: getRequirementAiMatches
      tags: [requirements]
      summary: AI-ranked trainer matches for a requirement (vendor owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI-ranked trainer matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiMatch"
        "403":
          description: Not the owning vendor
        "404":
          description: Requirement not found

  /requirements/{id}/suggested-trainers:
    get:
      operationId: getSuggestedTrainers
      tags: [requirements]
      summary: Trainers whose skills match a requirement (up to 5, ranked)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggested trainers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestedTrainer"
        "404":
          description: Requirement not found

  /requirements/{id}/apply:
    post:
      operationId: applyToRequirement
      tags: [applications]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyBody"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /requirements/{id}/applications:
    get:
      operationId: listRequirementApplications
      tags: [applications]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Applications for a requirement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithTrainer"

  /applications:
    get:
      operationId: listMyApplications
      tags: [applications]
      summary: Applications for current user (trainer view)
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithRequirement"

  /applications/{id}:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /messages/threads:
    get:
      operationId: listMessageThreads
      tags: [messages]
      summary: List all message threads for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Message threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageThreadItem"

  /applications/{id}/note:
    patch:
      operationId: updateApplicationNote
      tags: [applications]
      summary: Save a private vendor note on an application
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationNoteBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "403":
          description: Not the owning vendor
        "404":
          description: Application not found

  /applications/{id}/complete:
    post:
      operationId: completeApplication
      tags: [applications]
      summary: Mark a hired application as completed (vendor-owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completed application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "403":
          description: Not the owning vendor
        "404":
          description: Application not found
        "409":
          description: Application is not in hired status

  /applications/{id}/withdraw:
    post:
      operationId: withdrawApplication
      tags: [applications]
      summary: Trainer withdraws their own application
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawApplicationBody"
      responses:
        "200":
          description: Application after withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}/messages:
    get:
      operationId: listApplicationMessages
      tags: [applications]
      summary: Get message thread for an application
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendApplicationMessage
      tags: [applications]
      summary: Send a message in an application thread
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /stats/vendor:
    get:
      operationId: getVendorStats
      tags: [stats]
      summary: Dashboard stats for the active vendor
      responses:
        "200":
          description: Vendor stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorStats"

