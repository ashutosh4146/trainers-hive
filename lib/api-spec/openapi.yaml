      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
        name:
          type: string
        email:
          type: string
          format: email
        orgName:
          type: string
        orgType:
          type: string

    SkillCategory:
      type: object
      required: [id, name, skills]
