name: Patch home trainer visibility

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Hide trainer previews from trainer/vendor home
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/pages/Home.tsx')
          s = p.read_text()
          s = s.replace('const { isSignedIn } = useAuth();', 'const { isSignedIn, auth } = useAuth();')
          s = s.replace('const isLoggedIn = isSignedIn;', 'const isLoggedIn = isSignedIn;\n  const isAdmin = auth?.role === "admin";')
          s = s.replace('const showFeaturedTrainers = isLoggedIn && (trainersLoading || featuredTrainersList.length > 0);', 'const showFeaturedTrainers = isAdmin && (trainersLoading || featuredTrainersList.length > 0);')
          s = s.replace('const findTrainerHref = isLoggedIn ? "/trainers" : "/login";\n', '')
          s = s.replace('''              <Link href={findTrainerHref}>
                <Button size="lg" variant="outline" className="h-12 px-8 text-base border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:text-white backdrop-blur-sm">
                  Find a Trainer
                </Button>
              </Link>''', '''              {isAdmin && (
                <Link href="/trainers">
                  <Button size="lg" variant="outline" className="h-12 px-8 text-base border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:text-white backdrop-blur-sm">
                    View Trainer Directory
                  </Button>
                </Link>
              )}''')
          p.write_text(s)
          Path('.github/workflows/patch-home-hide-featured.yml').unlink(missing_ok=True)
          Path('tmp-home-featured-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Home.tsx .github/workflows/patch-home-hide-featured.yml tmp-home-featured-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Hide trainer previews from non-admin home"
            git push origin HEAD:dashboard-applications-alignment
          fi
