name: Temporary add trainer email prefs endpoints

on:
  push:
    branches:
      - vendor-profile-polish-ui

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: vendor-profile-polish-ui
      - name: Add trainer email preference endpoints
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/api-server/src/routes/trainers.ts')
          s = p.read_text()
          if 'TrainerEmailPrefsSchema' not in s:
              marker = '''const PREF_LABELS: Record<string, string> = {
  endorsements: "endorsement emails",
  applicationStatus: "application status emails",
  newRequirementMatch: "requirement match emails",
  messages: "message notification emails",
};
'''
              insert = marker + '''
const DEFAULT_TRAINER_EMAIL_PREFS = {
  endorsements: true,
  applicationStatus: true,
  newRequirementMatch: true,
  messages: true,
};

const TrainerEmailPrefsSchema = z.object({
  endorsements: z.boolean().optional(),
  applicationStatus: z.boolean().optional(),
  newRequirementMatch: z.boolean().optional(),
  messages: z.boolean().optional(),
});

function resolveTrainerEmailPrefs(raw: unknown) {
  return {
    ...DEFAULT_TRAINER_EMAIL_PREFS,
    ...(raw && typeof raw === "object" ? raw as Partial<typeof DEFAULT_TRAINER_EMAIL_PREFS> : {}),
  };
}

async function requireOwningTrainer(req: express.Request, res: express.Response, trainerId: string): Promise<boolean> {
  const activeId = await getActiveUserId(req);
  const [active] = await db.select().from(usersTable).where(eq(usersTable.id, activeId)).limit(1);
  if (!active || active.role !== "trainer" || active.trainerId !== trainerId) {
    res.status(403).json({ error: "forbidden" });
    return false;
  }
  return true;
}

// GET /trainers/:id/email-prefs
router.get("/trainers/:id/email-prefs", async (req, res) => {
  const params = GetTrainerParams.safeParse(req.params);
  if (!params.success) {
    res.status(400).json({ error: "invalid params" });
    return;
  }
  if (!(await requireOwningTrainer(req, res, params.data.id))) return;
  const [row] = await db
    .select({ emailPrefs: trainersTable.emailPrefs })
    .from(trainersTable)
    .where(eq(trainersTable.id, params.data.id))
    .limit(1);
  if (!row) {
    res.status(404).json({ error: "trainer not found" });
    return;
  }
  res.json(resolveTrainerEmailPrefs(row.emailPrefs));
});

// PATCH /trainers/:id/email-prefs
router.patch("/trainers/:id/email-prefs", async (req, res) => {
  const params = GetTrainerParams.safeParse(req.params);
  if (!params.success) {
    res.status(400).json({ error: "invalid params" });
    return;
  }
  const body = TrainerEmailPrefsSchema.safeParse(req.body);
  if (!body.success) {
    res.status(400).json({ error: "invalid body", details: body.error.issues });
    return;
  }
  if (!(await requireOwningTrainer(req, res, params.data.id))) return;
  const [existing] = await db
    .select({ emailPrefs: trainersTable.emailPrefs })
    .from(trainersTable)
    .where(eq(trainersTable.id, params.data.id))
    .limit(1);
  if (!existing) {
    res.status(404).json({ error: "trainer not found" });
    return;
  }
  const merged = { ...resolveTrainerEmailPrefs(existing.emailPrefs), ...body.data };
  await db.update(trainersTable).set({ emailPrefs: merged }).where(eq(trainersTable.id, params.data.id));
  res.json(merged);
});
'''
              if marker not in s:
                  raise SystemExit('PREF_LABELS marker not found')
              s = s.replace(marker, insert)
          p.write_text(s)
          Path('tmp-add-trainer-email-prefs.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/api-server/src/routes/trainers.ts tmp-add-trainer-email-prefs.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add trainer email preference endpoints"
            git push origin HEAD:vendor-profile-polish-ui
          fi
