name: Patch vendor right column gap

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Add payment snapshot under recommended actions
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx')
          s = p.read_text()
          old = '<ActionCard title="Finalize agreements" description="After hiring, confirm scope, dates, commercials, and payment terms." href="/agreements" icon={<FileSignature className="h-5 w-5" />} cta="View agreements" /></CardContent></Card></div>\n      </div>'
          new = '<ActionCard title="Finalize agreements" description="After hiring, confirm scope, dates, commercials, and payment terms." href="/agreements" icon={<FileSignature className="h-5 w-5" />} cta="View agreements" /></CardContent></Card><Card className="border-primary/10"><CardHeader><CardTitle className="flex items-center gap-2"><Wallet className="h-5 w-5 text-primary" /> Payment snapshot</CardTitle><CardDescription>Quick view before the full payment section.</CardDescription></CardHeader><CardContent className="space-y-3"><div className="grid grid-cols-3 gap-2 text-center"><div className="rounded-xl border bg-primary/5 p-3"><p className="truncate text-sm font-bold">{money(totalCommitted)}</p><p className="mt-1 text-[10px] text-muted-foreground">committed</p></div><div className="rounded-xl border p-3"><p className="truncate text-sm font-bold text-emerald-700">{money(totalPaid)}</p><p className="mt-1 text-[10px] text-muted-foreground">paid</p></div><div className="rounded-xl border p-3"><p className="truncate text-sm font-bold text-amber-700">{money(totalOutstanding)}</p><p className="mt-1 text-[10px] text-muted-foreground">due</p></div></div><Button type="button" variant="outline" className="w-full" onClick={() => document.querySelector(\'[data-section="vendor-payments"]\')?.scrollIntoView({ behavior: \'smooth\', block: \'start\' })}>Open payments</Button></CardContent></Card></div>\n      </div>'
          if old not in s:
              raise SystemExit('Target block not found')
          s = s.replace(old, new)
          s = s.replace('<Card><CardHeader><CardTitle className="flex items-center gap-2"><Wallet className="h-5 w-5 text-primary" /> Spend and payments</CardTitle>', '<Card data-section="vendor-payments"><CardHeader><CardTitle className="flex items-center gap-2"><Wallet className="h-5 w-5 text-primary" /> Spend and payments</CardTitle>')
          p.write_text(s)
          Path('.github/workflows/patch-vendor-right-gap.yml').unlink(missing_ok=True)
          Path('tmp-vendor-right-gap-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx .github/workflows/patch-vendor-right-gap.yml tmp-vendor-right-gap-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add vendor payment snapshot card"
            git push origin HEAD:dashboard-applications-alignment
          fi
