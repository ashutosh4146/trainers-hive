name: Wire vendor profile polish

on:
  push:
    branches:
      - vendor-profile-polish-ui

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: vendor-profile-polish-ui
      - name: Wire component
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/pages/Profile.tsx')
          s = p.read_text()
          if 'VendorProfilePolish' not in s:
              s = s.replace('import { cn } from "@/lib/utils";\n', 'import { cn } from "@/lib/utils";\nimport { VendorProfilePolish } from "@/components/VendorProfilePolish";\n')
          old = 'function VendorProfile({ vendorId }: { vendorId: string }) {\n  const { data: vendor, isLoading } = useGetVendor(vendorId, {'
          new = 'function VendorProfile({ vendorId }: { vendorId: string }) {\n  return <VendorProfilePolish vendorId={vendorId} />;\n\n  const { data: vendor, isLoading } = useGetVendor(vendorId, {'
          if old in s and 'return <VendorProfilePolish vendorId={vendorId} />;' not in s:
              s = s.replace(old, new)
          p.write_text(s)
          Path('.github/workflows/wire-vendor-profile-polish.yml').unlink(missing_ok=True)
          Path('tmp-wire-vendor-profile-polish.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Profile.tsx .github/workflows/wire-vendor-profile-polish.yml tmp-wire-vendor-profile-polish.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Use polished vendor profile component"
            git push origin HEAD:vendor-profile-polish-ui
          fi
