name: Patch vendor pipeline page size

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Increase requirements pipeline length
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx')
          s = p.read_text()
          s = s.replace('const pageSize = 5;', 'const pageSize = 8;')
          p.write_text(s)
          Path('.github/workflows/patch-vendor-pipeline-page-size.yml').unlink(missing_ok=True)
          Path('tmp-vendor-pipeline-page-size-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx .github/workflows/patch-vendor-pipeline-page-size.yml tmp-vendor-pipeline-page-size-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Show more vendor requirements per page"
            git push origin HEAD:dashboard-applications-alignment
          fi
