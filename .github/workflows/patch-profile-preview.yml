name: Patch trainer profile preview

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Add trainer public preview card
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('artifacts/trainers-hive/src/pages/Profile.tsx')
          s = path.read_text()

          marker = '''  const isProfileComplete = React.useMemo(() => {
    if (!trainer) return false;
    const t = trainer as typeof trainer & { trainerType?: string; languages?: string[] };
    return !!(
      t.name?.trim() &&
      t.mainSkill?.trim() &&
      t.location?.trim() &&
      t.trainerType &&
      (t.languages ?? []).length > 0
    );
  }, [trainer]);
'''
          insert = marker + '''
  const previewName = form.watch("name")?.trim() || trainer?.name || "Your name";
  const previewHeadline = form.watch("headline")?.trim() || "Add a short headline so vendors understand your expertise at a glance.";
  const previewMainSkill = form.watch("mainSkill")?.trim() || "Primary skill";
  const previewExperience = Number(form.watch("experienceYears") ?? 0);
  const previewLocation = form.watch("location")?.trim() || "Location";
'''
          if marker in s and 'const previewHeadline = form.watch("headline")' not in s:
              s = s.replace(marker, insert)

          alert_block = '''        {!isProfileComplete && (
          <div className="mb-6 flex items-start gap-3 rounded-lg border border-amber-200 bg-amber-50 dark:bg-amber-950/20 dark:border-amber-800 px-4 py-3">
            <ShieldAlert className="h-5 w-5 text-amber-600 dark:text-amber-400 shrink-0 mt-0.5" />
            <div>
              <p className="text-sm font-semibold text-amber-800 dark:text-amber-300">Complete your profile to start applying</p>
              <p className="text-xs text-amber-700 dark:text-amber-400 mt-0.5">
                The fields marked <span className="font-semibold">Required</span> below must be filled and saved before you can access your dashboard.
              </p>
            </div>
          </div>
        )}
'''
          preview_block = alert_block + '''
        <div className="mb-6 rounded-xl border bg-muted/30 p-4">
          <div className="mb-3 flex items-center justify-between gap-3">
            <div>
              <p className="text-sm font-semibold">Public trainer card preview</p>
              <p className="text-xs text-muted-foreground">This is how your profile summary appears to vendors.</p>
            </div>
            {trainer?.verified && <Badge variant="secondary" className="bg-blue-100 text-blue-800">Verified</Badge>}
          </div>
          <div className="rounded-lg border bg-background p-4 shadow-sm">
            <div className="flex items-start gap-3">
              <TrainerAvatar name={previewName} avatarUrl={trainer?.avatarUrl} className="h-12 w-12 border border-border" />
              <div className="min-w-0 flex-1">
                <div className="flex flex-wrap items-center gap-2">
                  <p className="truncate text-base font-semibold">{previewName}</p>
                  {trainer?.verified && <Badge variant="secondary" className="h-5 bg-blue-100 px-1.5 py-0 text-blue-800">Verified</Badge>}
                </div>
                <p className="mt-1 line-clamp-2 text-sm text-muted-foreground">{previewHeadline}</p>
              </div>
            </div>
            <div className="mt-4 flex flex-wrap gap-1.5">
              <Badge variant="outline" className="border-primary/20 bg-primary/5 font-normal text-primary">{previewMainSkill}</Badge>
              {subSkills.slice(0, 3).map((skill) => <Badge key={skill} variant="outline" className="font-normal text-muted-foreground">{skill}</Badge>)}
              {subSkills.length > 3 && <Badge variant="outline" className="border-dashed font-normal text-muted-foreground">+{subSkills.length - 3}</Badge>}
            </div>
            <div className="mt-4 grid grid-cols-2 gap-y-2 border-t pt-3 text-sm text-muted-foreground">
              <span>{Number.isFinite(previewExperience) ? previewExperience : 0}y training exp</span>
              <span className="truncate text-right">{previewLocation}</span>
            </div>
          </div>
        </div>
'''
          if alert_block in s and 'Public trainer card preview' not in s:
              s = s.replace(alert_block, preview_block)

          path.write_text(s)
          Path('.github/workflows/patch-profile-preview.yml').unlink(missing_ok=True)
          PY
      - name: Commit patched file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Profile.tsx .github/workflows/patch-profile-preview.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add trainer profile card preview"
            git push origin HEAD:dashboard-applications-alignment
          fi
