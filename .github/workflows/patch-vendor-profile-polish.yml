name: Patch vendor profile polish

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Polish vendor profile page
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/pages/Profile.tsx')
          s = p.read_text()
          s = s.replace('  EyeOff,\n} from "lucide-react";', '  EyeOff,\n  Building2,\n  BriefcaseBusiness,\n  Globe2,\n  MapPin,\n  UserRound,\n} from "lucide-react";')
          start = s.index('// =========================\n// Vendor Form')
          end = s.index('// ==========================================================\n// Trainer form helpers')
          vendor_block = r'''// =========================
// Vendor Form
// =========================

const vendorSchema = z.object({
  companyName: z.string().min(2),
  industry: z.string().min(2),
  location: z.string().min(2),
  contactName: z.string().min(2),
  contactDesignation: z.string().min(2),
  about: z.string().optional(),
  websiteUrl: z.string().url().optional().or(z.literal("")),
});

type VendorFormValues = z.infer<typeof vendorSchema>;

function VendorProfile({ vendorId }: { vendorId: string }) {
  const { data: vendor, isLoading } = useGetVendor(vendorId, {
    query: { enabled: !!vendorId, queryKey: getGetVendorQueryKey(vendorId) },
  });
  const updateVendor = useUpdateVendor();
  const { toast } = useToast();
  const queryClient = useQueryClient();

  const form = useForm<VendorFormValues>({
    resolver: zodResolver(vendorSchema),
    defaultValues: {
      companyName: "",
      industry: "",
      location: "",
      contactName: "",
      contactDesignation: "",
      about: "",
      websiteUrl: "",
    },
  });

  React.useEffect(() => {
    if (vendor) {
      form.reset({
        companyName: vendor.companyName || "",
        industry: vendor.industry || "",
        location: vendor.location || "",
        contactName: vendor.contactName || "",
        contactDesignation: vendor.contactDesignation || "",
        about: vendor.about || "",
        websiteUrl: vendor.websiteUrl || "",
      });
    }
  }, [vendor, form]);

  const watched = form.watch();
  const completionItems = [
    { label: "Company", done: !!watched.companyName?.trim() },
    { label: "Industry", done: !!watched.industry?.trim() },
    { label: "Location", done: !!watched.location?.trim() },
    { label: "Contact", done: !!watched.contactName?.trim() && !!watched.contactDesignation?.trim() },
    { label: "About", done: !!watched.about?.trim() },
    { label: "Website", done: !!watched.websiteUrl?.trim() },
  ];
  const completionScore = Math.round((completionItems.filter((item) => item.done).length / completionItems.length) * 100);
  const website = (watched.websiteUrl || vendor?.websiteUrl || "").trim();

  const onSubmit = (data: VendorFormValues) => {
    updateVendor.mutate(
      { id: vendorId, data },
      {
        onSuccess: () => {
          toast({ title: "Profile updated", description: "Your vendor profile has been saved." });
          queryClient.invalidateQueries({ queryKey: getGetVendorQueryKey(vendorId) });
          queryClient.invalidateQueries({ queryKey: getGetCurrentUserQueryKey() });
        },
        onError: () => {
          toast({ title: "Error", description: "Failed to update profile", variant: "destructive" });
        },
      },
    );
  };

  if (isLoading) return <ProfileSkeleton />;

  return (
    <div className="space-y-6">
      <section className="overflow-hidden rounded-2xl border bg-gradient-to-br from-primary/15 via-background to-background p-5 md:p-6">
        <div className="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
          <div>
            <div className="flex flex-wrap items-center gap-2">
              <Badge variant="outline" className="border-primary/30 bg-primary/10 text-primary">Vendor profile</Badge>
              {vendor?.verified ? (
                <Badge variant="outline" className="border-blue-200 bg-blue-50 text-blue-700 dark:border-blue-800 dark:bg-blue-950/30 dark:text-blue-300">
                  <ShieldCheck className="mr-1 h-3.5 w-3.5" /> Verified by Trainers Hive
                </Badge>
              ) : (
                <Badge variant="outline" className="border-amber-200 bg-amber-50 text-amber-700 dark:border-amber-800 dark:bg-amber-950/30 dark:text-amber-300">
                  <ShieldAlert className="mr-1 h-3.5 w-3.5" /> Verification pending
                </Badge>
              )}
            </div>
            <h1 className="mt-3 text-2xl font-bold tracking-tight md:text-3xl">{watched.companyName || vendor?.companyName || "Vendor workspace"}</h1>
            <p className="mt-2 max-w-2xl text-sm leading-relaxed text-muted-foreground">
              Keep your company profile polished so trainers understand who they are applying to and vendors can manage hiring with trust.
            </p>
          </div>
          <div className="rounded-2xl border bg-background/80 p-4 text-center shadow-sm lg:min-w-[180px]">
            <p className="text-xs font-medium text-muted-foreground">Profile strength</p>
            <p className="mt-1 text-3xl font-bold text-primary">{completionScore}%</p>
            <p className="mt-1 text-xs text-muted-foreground">{completionItems.filter((item) => item.done).length} of {completionItems.length} complete</p>
          </div>
        </div>
      </section>

      <div className="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1.4fr)_minmax(320px,0.8fr)]">
        <Card className="border-primary/10">
          <CardHeader>
            <CardTitle>Company details</CardTitle>
            <CardDescription>These details appear anywhere your company is shown to trainers.</CardDescription>
          </CardHeader>
          <CardContent>
            <Form {...form}>
              <form onSubmit={form.handleSubmit(onSubmit)} className="space-y-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <FormField control={form.control} name="companyName" render={({ field }) => (
                    <FormItem><FormLabel>Company name <span className="text-destructive">*</span></FormLabel><FormControl><Input {...field} placeholder="e.g. Acme Learning Solutions" /></FormControl><FormMessage /></FormItem>
                  )} />
                  <FormField control={form.control} name="industry" render={({ field }) => (
                    <FormItem><FormLabel>Industry <span className="text-destructive">*</span></FormLabel><FormControl><Input {...field} placeholder="e.g. EdTech, Corporate L&D" /></FormControl><FormMessage /></FormItem>
                  )} />
                  <FormField control={form.control} name="contactName" render={({ field }) => (
                    <FormItem><FormLabel>Contact person <span className="text-destructive">*</span></FormLabel><FormControl><Input {...field} placeholder="Hiring or L&D contact" /></FormControl><FormMessage /></FormItem>
                  )} />
                  <FormField control={form.control} name="contactDesignation" render={({ field }) => (
                    <FormItem><FormLabel>Designation <span className="text-destructive">*</span></FormLabel><FormControl><Input {...field} placeholder="e.g. Training Manager" /></FormControl><FormMessage /></FormItem>
                  )} />
                  <FormField control={form.control} name="location" render={({ field }) => (
                    <FormItem><FormLabel>Headquarters location <span className="text-destructive">*</span></FormLabel><FormControl><Input {...field} placeholder="City, Country" /></FormControl><FormMessage /></FormItem>
                  )} />
                  <FormField control={form.control} name="websiteUrl" render={({ field }) => (
                    <FormItem>
                      <FormLabel>Website URL</FormLabel>
                      <FormControl>
                        <Input
                          type="url"
                          inputMode="url"
                          placeholder="https://www.yourcompany.com"
                          {...field}
                          onBlur={e => {
                            let val = e.target.value.trim();
                            if (val && !val.startsWith("http://") && !val.startsWith("https://")) {
                              val = "https://" + (val.startsWith("www.") ? val : "www." + val);
                              field.onChange(val);
                            }
                            field.onBlur();
                          }}
                        />
                      </FormControl>
                      <FormMessage />
                    </FormItem>
                  )} />
                </div>

                <div className="space-y-2">
                  <Label>Registered email</Label>
                  <Input value={vendor?.email || ""} disabled className="bg-muted" />
                  <p className="text-xs text-muted-foreground">Contact support to change your account email.</p>
                </div>

                <FormField control={form.control} name="about" render={({ field }) => (
                  <FormItem>
                    <FormLabel>About company</FormLabel>
                    <FormControl>
                      <Textarea rows={6} placeholder="Describe your company, training needs, client segments, and what trainers can expect when working with you." {...field} />
                    </FormControl>
                    <FormDescription>A clear company summary builds trust with applicants.</FormDescription>
                    <FormMessage />
                  </FormItem>
                )} />

                <div className="flex flex-col-reverse gap-3 border-t pt-5 sm:flex-row sm:items-center sm:justify-between">
                  <p className="text-xs text-muted-foreground">Saved changes update your vendor profile immediately.</p>
                  <Button type="submit" disabled={updateVendor.isPending}>
                    {updateVendor.isPending ? <Loader2 className="mr-2 h-4 w-4 animate-spin" /> : null}
                    {updateVendor.isPending ? "Saving..." : "Save vendor profile"}
                  </Button>
                </div>
              </form>
            </Form>
          </CardContent>
        </Card>

        <div className="space-y-6">
          <Card className="border-primary/10">
            <CardHeader>
              <CardTitle className="flex items-center gap-2"><Building2 className="h-5 w-5 text-primary" /> Profile preview</CardTitle>
              <CardDescription>How your company may appear to applicants.</CardDescription>
            </CardHeader>
            <CardContent className="space-y-4">
              <div className="rounded-2xl border bg-primary/5 p-4">
                <div className="flex items-start gap-3">
                  <span className="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-primary/10 text-primary"><Building2 className="h-6 w-6" /></span>
                  <div className="min-w-0">
                    <p className="truncate font-semibold">{watched.companyName || "Company name"}</p>
                    <p className="mt-1 text-sm text-muted-foreground">{watched.industry || "Industry"}</p>
                    <div className="mt-2 flex flex-wrap gap-1.5">
                      {vendor?.verified && <Badge variant="outline" className="border-blue-200 bg-blue-50 text-blue-700">Verified</Badge>}
                      {watched.location && <Badge variant="outline">{watched.location}</Badge>}
                    </div>
                  </div>
                </div>
                {watched.about && <p className="mt-4 line-clamp-4 text-sm leading-relaxed text-muted-foreground">{watched.about}</p>}
              </div>
              <div className="grid grid-cols-1 gap-3 text-sm">
                <div className="flex items-center gap-3 rounded-xl border p-3"><BriefcaseBusiness className="h-4 w-4 text-primary" /><span className="truncate">{watched.industry || "Industry not set"}</span></div>
                <div className="flex items-center gap-3 rounded-xl border p-3"><MapPin className="h-4 w-4 text-primary" /><span className="truncate">{watched.location || "Location not set"}</span></div>
                <div className="flex items-center gap-3 rounded-xl border p-3"><UserRound className="h-4 w-4 text-primary" /><span className="truncate">{watched.contactName || "Contact not set"}{watched.contactDesignation ? ` · ${watched.contactDesignation}` : ""}</span></div>
                <div className="flex items-center gap-3 rounded-xl border p-3"><Globe2 className="h-4 w-4 text-primary" />{website ? <a href={website} target="_blank" rel="noopener noreferrer" className="truncate text-primary hover:underline">{website.replace(/^https?:\/\//, "")}</a> : <span className="text-muted-foreground">Website not set</span>}</div>
              </div>
            </CardContent>
          </Card>

          <Card className="border-primary/10">
            <CardHeader>
              <CardTitle>Completion checklist</CardTitle>
              <CardDescription>Fill these to improve trainer trust.</CardDescription>
            </CardHeader>
            <CardContent className="space-y-2">
              {completionItems.map((item) => (
                <div key={item.label} className="flex items-center justify-between rounded-xl border p-3 text-sm">
                  <span>{item.label}</span>
                  {item.done ? <CheckCircle2 className="h-4 w-4 text-emerald-600" /> : <span className="text-xs text-muted-foreground">Pending</span>}
                </div>
              ))}
            </CardContent>
          </Card>
        </div>
      </div>
    </div>
  );
}

'''
          s = s[:start] + vendor_block + s[end:]
          p.write_text(s)
          Path('.github/workflows/patch-vendor-profile-polish.yml').unlink(missing_ok=True)
          Path('tmp-vendor-profile-polish-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Profile.tsx .github/workflows/patch-vendor-profile-polish.yml tmp-vendor-profile-polish-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Polish vendor profile page"
            git push origin HEAD:main
          fi
