name: Patch vendor pipeline to fill layout

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Show more requirements in vendor pipeline
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx')
          s = p.read_text()
          s = s.replace('const pageSize = 8;', 'const pageSize = 12;')
          s = s.replace('const pageSize = 5;', 'const pageSize = 12;')
          p.write_text(s)
          Path('.github/workflows/patch-vendor-pipeline-12.yml').unlink(missing_ok=True)
          Path('tmp-vendor-pipeline-12-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx .github/workflows/patch-vendor-pipeline-12.yml tmp-vendor-pipeline-12-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Extend vendor requirements pipeline list"
            git push origin HEAD:dashboard-applications-alignment
          fi
