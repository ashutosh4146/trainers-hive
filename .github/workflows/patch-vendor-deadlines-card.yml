name: Patch vendor deadlines card

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Add upcoming deadlines card below payment snapshot
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx')
          s = p.read_text()
          if 'Upcoming deadlines</CardTitle>' not in s:
              old = '<div className="grid grid-cols-3 gap-2 text-center"><div className="rounded-xl border bg-primary/5 p-3"><p className="truncate text-sm font-bold">{money(totalCommitted)}</p><p className="mt-1 text-[10px] text-muted-foreground">committed</p></div><div className="rounded-xl border p-3"><p className="truncate text-sm font-bold text-emerald-700">{money(totalPaid)}</p><p className="mt-1 text-[10px] text-muted-foreground">paid</p></div><div className="rounded-xl border p-3"><p className="truncate text-sm font-bold text-amber-700">{money(totalOutstanding)}</p><p className="mt-1 text-[10px] text-muted-foreground">due</p></div></div></CardContent></Card></div>\n      </div>'
              new = '<div className="grid grid-cols-3 gap-2 text-center"><div className="rounded-xl border bg-primary/5 p-3"><p className="truncate text-sm font-bold">{money(totalCommitted)}</p><p className="mt-1 text-[10px] text-muted-foreground">committed</p></div><div className="rounded-xl border p-3"><p className="truncate text-sm font-bold text-emerald-700">{money(totalPaid)}</p><p className="mt-1 text-[10px] text-muted-foreground">paid</p></div><div className="rounded-xl border p-3"><p className="truncate text-sm font-bold text-amber-700">{money(totalOutstanding)}</p><p className="mt-1 text-[10px] text-muted-foreground">due</p></div></div></CardContent></Card><Card className="border-primary/10"><CardHeader><CardTitle className="flex items-center gap-2"><Clock className="h-5 w-5 text-primary" /> Upcoming deadlines</CardTitle><CardDescription>Requirements that need attention soon.</CardDescription></CardHeader><CardContent className="space-y-2">{reqs.filter((req: any) => !!req.deadline).sort((a: any, b: any) => new Date(a.deadline).getTime() - new Date(b.deadline).getTime()).slice(0, 4).map((req: any) => { const deadline = parseDate(req.deadline); return <Link key={req.id} href={`/requirements/${req.id}`}><div className="rounded-xl border bg-background p-3 transition-colors hover:border-primary/40 hover:bg-primary/5"><div className="flex items-center justify-between gap-3"><div className="min-w-0"><p className="truncate text-sm font-semibold">{req.title}</p><p className="mt-0.5 text-xs text-muted-foreground">{req.skill || "Skill not set"} · {Number(req.applicationCount ?? 0)} applicants</p></div><Badge variant="outline" className="shrink-0">{deadline ? format(deadline, "MMM d") : "—"}</Badge></div></div></Link>; })}{reqs.filter((req: any) => !!req.deadline).length === 0 && <div className="rounded-xl border border-dashed py-6 text-center text-sm text-muted-foreground">No upcoming deadlines.</div>}</CardContent></Card></div>\n      </div>'
              if old not in s:
                  raise SystemExit('Payment snapshot block not found')
              s = s.replace(old, new)
          p.write_text(s)
          Path('.github/workflows/patch-vendor-deadlines-card.yml').unlink(missing_ok=True)
          Path('tmp-vendor-deadlines-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/components/VendorDashboardPolish.tsx .github/workflows/patch-vendor-deadlines-card.yml tmp-vendor-deadlines-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add vendor upcoming deadlines card"
            git push origin HEAD:dashboard-applications-alignment
          fi
