name: Patch vendor dashboard polish

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Wire polished vendor dashboard
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('artifacts/trainers-hive/src/pages/Dashboard.tsx')
          s = path.read_text()
          if 'VendorDashboardPolish' not in s:
              s = s.replace('import { MessageThread } from "@/components/MessageThread";\n', 'import { MessageThread } from "@/components/MessageThread";\nimport { VendorDashboardPolish } from "@/components/VendorDashboardPolish";\n')
          old = 'function VendorDashboard({ vendorId }: { vendorId: string }) {\n  const { data: vendor } = useGetVendor(vendorId);'
          new = 'function VendorDashboard({ vendorId }: { vendorId: string }) {\n  return <VendorDashboardPolish vendorId={vendorId} />;\n\n  const { data: vendor } = useGetVendor(vendorId);'
          if old in s and 'return <VendorDashboardPolish vendorId={vendorId} />;' not in s:
              s = s.replace(old, new)
          path.write_text(s)
          Path('.github/workflows/patch-vendor-dashboard-polish.yml').unlink(missing_ok=True)
          Path('tmp-vendor-dashboard-polish-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Dashboard.tsx .github/workflows/patch-vendor-dashboard-polish.yml tmp-vendor-dashboard-polish-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Use polished vendor dashboard"
            git push origin HEAD:dashboard-applications-alignment
          fi
