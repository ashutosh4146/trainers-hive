name: Temporary polish profile shell

on:
  push:
    branches:
      - vendor-profile-polish-ui

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: vendor-profile-polish-ui
      - name: Polish profile page shell
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/pages/Profile.tsx')
          s = p.read_text()
          s = s.replace('max-w-4xl"><ProfileSkeleton /></div>', 'max-w-7xl"><ProfileSkeleton /></div>')
          s = s.replace('<div className="container mx-auto px-4 py-8 md:py-12 max-w-4xl">', '<div className="container mx-auto max-w-7xl space-y-6 px-4 py-8 md:py-12">')
          old = '''      <div className="mb-8">
        <h1 className="text-3xl font-bold tracking-tight">Your Profile</h1>
        <p className="text-muted-foreground mt-1 capitalize">Manage your {user.role} identity.</p>
      </div>'''
          new = '''      <section className="overflow-hidden rounded-2xl border bg-gradient-to-br from-primary/15 via-background to-background p-5 md:p-6">
        <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <div className="flex flex-wrap items-center gap-2">
              <Badge variant="outline" className="border-primary/30 bg-primary/10 text-primary">Profile</Badge>
              <Badge variant="outline" className="capitalize">{user.role} account</Badge>
            </div>
            <h1 className="mt-3 text-2xl font-bold tracking-tight md:text-3xl">Your Profile</h1>
            <p className="mt-2 max-w-2xl text-sm leading-relaxed text-muted-foreground capitalize">Manage your {user.role} identity, public details, account access, and availability.</p>
          </div>
          <div className="rounded-2xl border bg-background/80 p-4 shadow-sm md:min-w-[240px]">
            <p className="text-xs font-medium text-muted-foreground">Signed in as</p>
            <p className="mt-1 truncate font-semibold">{user.name}</p>
            <p className="mt-1 truncate text-sm text-muted-foreground">{user.email}</p>
          </div>
        </div>
      </section>'''
          if old in s:
              s = s.replace(old, new)
          p.write_text(s)
          Path('tmp-profile-shell-polish.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Profile.tsx tmp-profile-shell-polish.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Polish profile page shell"
            git push origin HEAD:vendor-profile-polish-ui
          fi
