name: Patch home trainer CTA

on:
  push:
    branches:
      - dashboard-applications-alignment

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-applications-alignment
      - name: Fix trainer CTA visibility
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('artifacts/trainers-hive/src/pages/Home.tsx')
          s = p.read_text()
          old = '''              <Link href={findTrainerHref}>
                <Button size="lg" variant="outline" className="h-12 px-8 text-base border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:text-white backdrop-blur-sm">
                  Find a Trainer
                </Button>
              </Link>'''
          new = '''              {isAdmin && (
                <Link href="/trainers">
                  <Button size="lg" variant="outline" className="h-12 px-8 text-base border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:text-white backdrop-blur-sm">
                    View Trainer Directory
                  </Button>
                </Link>
              )}'''
          if old not in s and 'findTrainerHref' in s:
              raise SystemExit('Find Trainer block not found')
          s = s.replace(old, new)
          s = s.replace('const findTrainerHref = isLoggedIn ? "/trainers" : "/login";\n', '')
          p.write_text(s)
          Path('.github/workflows/patch-home-cta.yml').unlink(missing_ok=True)
          Path('tmp-home-cta-trigger.txt').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/trainers-hive/src/pages/Home.tsx .github/workflows/patch-home-cta.yml tmp-home-cta-trigger.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Hide trainer directory CTA from non-admin home"
            git push origin HEAD:dashboard-applications-alignment
          fi
