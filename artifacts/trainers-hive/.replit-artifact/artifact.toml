kind = "web"
previewPath = "/"
title = "Trainers Hive"
version = "1.0.0"
id = "artifacts/trainers-hive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23629

[services.development]
run = "pnpm --filter @workspace/trainers-hive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trainers-hive", "run", "build" ]
publicDir = "artifacts/trainers-hive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23629"
BASE_PATH = "/"
